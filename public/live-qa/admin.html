<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Q&A Admin - Shabibeh</title>
  <link rel="icon" type="image/png" href="/churchlogo.png">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Live Q&A</h1>
      <p class="subtitle">Admin Dashboard</p>
    </header>

    <!-- Login -->
    <main id="login-view">
      <form id="login-form">
        <input type="password" id="password-input" placeholder="Enter admin password" required>
        <button type="submit">Log In</button>
      </form>
      <div id="login-error" class="error hidden"></div>
    </main>

    <!-- Dashboard -->
    <main id="dashboard-view" class="hidden">
      <!-- No active session -->
      <div id="no-session-admin">
        <p class="muted">No active session.</p>
        <div class="session-start-actions">
          <button id="start-public-btn">Start Session (Public Voting)</button>
          <button id="start-private-btn" class="secondary-btn">Start Session (Private)</button>
        </div>
      </div>

      <!-- Active session controls -->
      <div id="session-controls" class="hidden">
        <div class="session-status">
          <span id="session-mode" class="session-mode-tag"></span>
          <div class="session-actions">
            <button id="toggle-visibility-btn" class="secondary-btn"></button>
            <button id="close-session-btn" class="close-session-btn">End Session</button>
          </div>
        </div>

        <h2 class="live-qa-heading">Questions <span id="admin-question-count" class="question-count"></span></h2>
        <div id="admin-questions-list"></div>
        <p id="admin-no-questions" class="muted hidden">No questions yet.</p>
      </div>
      <!-- Past sessions -->
      <div id="past-sessions-section">
        <h2 class="live-qa-heading" style="cursor:pointer" id="past-sessions-toggle">Past Sessions <span class="toggle-arrow">&#9654;</span></h2>
        <div id="past-sessions-list" class="hidden"></div>
      </div>
    </main>
  </div>

  <!-- End session confirmation modal -->
  <div id="end-session-modal" class="modal-overlay hidden">
    <div class="modal">
      <p>End the current Q&A session?</p>
      <div class="modal-actions">
        <button id="end-modal-cancel" class="secondary-btn">Cancel</button>
        <button id="end-modal-confirm" class="delete-confirm-btn">End Session</button>
      </div>
    </div>
  </div>

  <a href="/" class="home-btn" title="Home">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span>Back to Home</span>
  </a>
  <a href="/live-qa" class="admin-btn">Back</a>

  <script src="/js/common.js"></script>
  <script src="/live-qa/js/admin.js"></script>
</body>
</html>
