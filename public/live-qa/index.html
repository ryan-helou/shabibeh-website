<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Q&A - Shabibeh</title>
  <link rel="icon" type="image/png" href="/churchlogo.png">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Live Q&A</h1>
      <p class="subtitle">Ask questions during the sermon</p>
    </header>

    <!-- No active session -->
    <div id="no-session" class="muted hidden">No active Q&A session right now.</div>

    <!-- Active session -->
    <div id="session-view" class="hidden">
      <!-- Submission form -->
      <form id="question-form">
        <textarea
          id="question-input"
          placeholder="Ask your question..."
          maxlength="500"
          rows="3"
          required
        ></textarea>
        <div class="char-count">
          <span id="char-counter">0</span>/500
        </div>
        <button type="submit" id="submit-btn">Submit Question</button>
      </form>

      <div id="submit-success" class="success-inline hidden">Question submitted!</div>
      <div id="error-message" class="error hidden"></div>

      <!-- Questions list (visible when public voting is on) -->
      <div id="questions-section" class="hidden">
        <h2 class="live-qa-heading">Questions <span id="question-count" class="question-count"></span></h2>
        <div id="questions-list"></div>
      </div>

      <!-- Private mode message -->
      <div id="private-message" class="muted hidden">Your questions have been submitted. The speaker will review them.</div>
    </div>
  </div>

  <a href="/" class="home-btn" title="Home">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span>Back to Home</span>
  </a>

  <script src="/js/common.js"></script>
  <script src="/live-qa/js/app.js"></script>
</body>
</html>
