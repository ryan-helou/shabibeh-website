<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Questions - Shabibeh</title>
  <link rel="icon" type="image/png" href="/churchlogo.png">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Questions</h1>
      <p class="subtitle">Submit your question</p>
    </header>

    <!-- Question submission form -->
    <main id="form-view">
      <form id="question-form">
        <input
          type="text"
          id="name-input"
          placeholder="Name (leave empty for anonymous)"
          maxlength="100"
        >
        <textarea
          id="question-input"
          placeholder="Ask your question..."
          maxlength="500"
          rows="4"
          required
        ></textarea>
        <div class="char-count">
          <span id="char-counter">0</span>/500
        </div>
        <button type="submit" id="submit-btn">Submit Question</button>
      </form>
    </main>

    <!-- Success message (hidden by default) -->
    <main id="success-view" class="hidden">
      <div class="success-message">
        <span class="checkmark">&#10004;</span>
        <p>Good job, you submitted!</p>
        <button id="another-btn" class="secondary-btn">Ask another question</button>
      </div>
    </main>

    <!-- Error message area -->
    <div id="error-message" class="error hidden"></div>

    <!-- User's submitted questions (always shown if they have past questions) -->
    <div id="my-questions" class="hidden">
      <h2 class="my-questions-heading">Your Submitted Questions</h2>
      <div id="my-questions-list"></div>
    </div>
  </div>

  <a href="/" class="home-btn" title="Home">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
  </a>
  <a href="/questions/admin.html" class="admin-btn">Admin</a>

  <script src="/js/common.js"></script>
  <script src="/questions/js/app.js"></script>
</body>
</html>
