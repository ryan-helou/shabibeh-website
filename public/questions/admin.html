<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Questions Admin - Shabibeh</title>
  <link rel="icon" type="image/png" href="/churchlogo.png">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Questions</h1>
      <p class="subtitle">Admin Dashboard</p>
    </header>

    <!-- Login prompt (shown first) -->
    <main id="login-view">
      <form id="login-form">
        <input
          type="password"
          id="password-input"
          placeholder="Enter admin password"
          required
        />
        <button type="submit">Log In</button>
      </form>
      <div id="login-error" class="error hidden"></div>
    </main>

    <!-- Admin dashboard (hidden until authenticated) -->
    <main id="dashboard-view" class="hidden">
      <div class="dashboard-header">
        <h2 id="view-title">Submitted Questions</h2>
        <div class="dashboard-actions">
          <button id="answered-view-btn" class="secondary-btn">Answered Questions</button>
          <button id="refresh-btn" class="secondary-btn">Refresh</button>
        </div>
      </div>
      <div id="questions-list"></div>
      <p id="no-questions" class="hidden muted">No questions yet.</p>
    </main>
  </div>

  <!-- Custom delete confirmation modal -->
  <div id="delete-modal" class="modal-overlay hidden">
    <div class="modal">
      <p>Delete this question?</p>
      <div class="modal-actions">
        <button id="modal-cancel" class="secondary-btn">Cancel</button>
        <button id="modal-confirm" class="delete-confirm-btn">Delete</button>
      </div>
    </div>
  </div>

  <a href="/" class="home-btn" title="Home">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span>Back to Home</span>
  </a>
  <a href="/questions" class="admin-btn">Back</a>

  <script src="/js/common.js"></script>
  <script src="/questions/js/admin.js"></script>
</body>
</html>
