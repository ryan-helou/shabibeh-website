<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Shabibeh</title>
  <link rel="icon" type="image/png" href="/churchlogo.png">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="container home-container">
    <header>
      <div class="home-title">
        <img src="/churchlogo.png" alt="AEBC Logo" class="home-logo">
        <h1>AEBC Shabibeh</h1>
      </div>
    </header>

    <nav class="home-nav" id="home-nav">
      <a href="/questions" class="nav-card" data-section="show_questions">
        <span class="nav-icon">💬</span>
        <span class="nav-label">Questions</span>
        <span class="nav-desc">Submit your questions</span>
      </a>
      <a href="/recordings" class="nav-card" data-section="show_recordings">
        <span class="nav-icon">🎙️</span>
        <span class="nav-label">Recordings</span>
        <span class="nav-desc">Listen to past sermons</span>
      </a>
      <a href="/slides" class="nav-card" data-section="show_slides">
        <span class="nav-icon">📖</span>
        <span class="nav-label">Sermon Slides</span>
        <span class="nav-desc">View and download sermon slides</span>
      </a>
      <a href="/live-qa" class="nav-card" data-section="show_live_qa">
        <span class="nav-icon">🙋</span>
        <span class="nav-label">Live Q&A</span>
        <span class="nav-desc">Ask questions during the sermon</span>
      </a>
    </nav>
  </div>

  <a href="/settings" class="settings-btn">⚙️ Admin</a>

  <script>
    fetch('/api/settings')
      .then(r => r.json())
      .then(data => {
        const s = data.settings || {};
        document.querySelectorAll('[data-section]').forEach(card => {
          if (s[card.dataset.section] === false) {
            card.style.display = 'none';
          }
        });
      })
      .catch(() => {});

    // Page transition
    document.querySelectorAll('a[href]').forEach(link => {
      link.addEventListener('click', (e) => {
        const href = link.getAttribute('href');
        if (!href || href.startsWith('#') || href.startsWith('http') || link.hasAttribute('download')) return;
        e.preventDefault();
        document.body.classList.add('page-exit');
        setTimeout(() => { window.location.href = href; }, 200);
      });
    });
  </script>
</body>
</html>
