<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Ideas - Shabibeh</title>
  <link rel="icon" type="image/png" href="/churchlogo.png">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Ideas</h1>
      <p class="subtitle">Track future website improvements</p>
    </header>

    <!-- Login -->
    <main id="login-view">
      <form id="login-form">
        <input type="password" id="password-input" placeholder="Enter admin password" required>
        <button type="submit">Log In</button>
      </form>
      <div id="login-error" class="error hidden"></div>
    </main>

    <!-- Ideas Board -->
    <main id="dashboard-view" class="hidden">
      <form id="idea-form">
        <textarea id="idea-input" placeholder="Write your idea..." rows="2" required></textarea>
        <button type="submit" id="submit-btn">Add Idea</button>
      </form>
      <div id="error-message" class="error hidden"></div>

      <!-- Todo Column -->
      <div class="board-section">
        <div class="board-header">
          <h2>Todo <span id="todo-count" class="question-count"></span></h2>
        </div>
        <div id="todo-list"></div>
        <p id="no-todo" class="muted hidden">No ideas yet. Add one above!</p>
      </div>

      <!-- Done Column -->
      <div class="board-section">
        <div class="board-header">
          <h2>Done <span id="done-count" class="question-count"></span></h2>
          <button id="toggle-done" class="toggle-done-btn">Show</button>
        </div>
        <div id="done-list" class="hidden"></div>
      </div>
    </main>
  </div>

  <a href="/settings" class="home-btn" title="Back">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/></svg>
    <span>Back</span>
  </a>

  <script src="/js/common.js"></script>
  <script src="/ideas/js/app.js"></script>
</body>
</html>
