<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Admin - Shabibeh</title>
  <link rel="icon" type="image/png" href="/churchlogo.png">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>⚙️ Admin</h1>
    </header>

    <!-- Login -->
    <main id="login-view">
      <form id="login-form">
        <input type="password" id="password-input" placeholder="Enter admin password" required>
        <button type="submit">Log In</button>
      </form>
      <div id="login-error" class="error hidden"></div>
    </main>

    <!-- Admin Dashboard -->
    <main id="admin-view" class="hidden">

      <!-- Visibility Toggles -->
      <div class="admin-section">
        <h2 class="admin-section-title">Section Visibility</h2>
        <p class="admin-section-desc">Toggle sections on or off for everyone</p>
        <div class="toggle-list">
          <div class="toggle-row" data-key="show_questions">
            <div class="toggle-label">
              <span>💬</span>
              <span>Questions</span>
            </div>
            <button class="toggle-switch on" aria-label="Toggle Questions"></button>
          </div>
          <div class="toggle-row" data-key="show_recordings">
            <div class="toggle-label">
              <span>🎙️</span>
              <span>Recordings</span>
            </div>
            <button class="toggle-switch on" aria-label="Toggle Recordings"></button>
          </div>
          <div class="toggle-row" data-key="show_slides">
            <div class="toggle-label">
              <span>📖</span>
              <span>Sermon Slides</span>
            </div>
            <button class="toggle-switch on" aria-label="Toggle Slides"></button>
          </div>
          <div class="toggle-row" data-key="show_live_qa">
            <div class="toggle-label">
              <span>🙋</span>
              <span>Live Q&A</span>
            </div>
            <button class="toggle-switch on" aria-label="Toggle Live Q&A"></button>
          </div>
        </div>
      </div>

      <!-- Nav to Ideas -->
      <div class="admin-section">
        <h2 class="admin-section-title">Tools</h2>
        <nav class="settings-nav">
          <a href="/ideas" class="nav-card">
            <span class="nav-icon">💡</span>
            <span class="nav-label">Ideas</span>
            <span class="nav-desc">Track future website improvements</span>
          </a>
        </nav>
      </div>
    </main>
  </div>

  <a href="/" class="home-btn" title="Home">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span>Back to Home</span>
  </a>

  <script>
  document.addEventListener('DOMContentLoaded', () => {
    const loginView = document.getElementById('login-view');
    const adminView = document.getElementById('admin-view');
    const loginForm = document.getElementById('login-form');
    const passwordInput = document.getElementById('password-input');
    const loginError = document.getElementById('login-error');

    let adminPassword = '';

    // Auto-login
    const saved = localStorage.getItem('admin_password');
    if (saved) {
      adminPassword = saved;
      tryLogin(saved);
    }

    loginForm.addEventListener('submit', (e) => {
      e.preventDefault();
      loginError.classList.add('hidden');
      const pw = passwordInput.value.trim();
      if (!pw) return;
      adminPassword = pw;
      tryLogin(pw);
    });

    async function tryLogin(pw) {
      try {
        const res = await fetch('/api/ideas', {
          headers: { 'x-admin-password': pw },
        });
        if (res.ok) {
          localStorage.setItem('admin_password', pw);
          loginView.classList.add('hidden');
          adminView.classList.remove('hidden');
          loadSettings();
        } else {
          loginError.textContent = 'Wrong password.';
          loginError.classList.remove('hidden');
        }
      } catch {
        loginError.textContent = 'Could not connect to server.';
        loginError.classList.remove('hidden');
      }
    }

    // Load current settings
    async function loadSettings() {
      try {
        const res = await fetch('/api/settings');
        const data = await res.json();
        const settings = data.settings || {};

        document.querySelectorAll('.toggle-row').forEach(row => {
          const key = row.dataset.key;
          const btn = row.querySelector('.toggle-switch');
          // Default to ON if no setting exists
          const isOn = settings[key] !== false;
          btn.classList.toggle('on', isOn);
        });
      } catch {}
    }

    // Toggle clicks
    document.querySelectorAll('.toggle-row').forEach(row => {
      const key = row.dataset.key;
      const btn = row.querySelector('.toggle-switch');

      btn.addEventListener('click', async () => {
        const newValue = !btn.classList.contains('on');
        btn.classList.toggle('on', newValue);

        try {
          await fetch('/api/settings', {
            method: 'PATCH',
            headers: {
              'Content-Type': 'application/json',
              'x-admin-password': adminPassword,
            },
            body: JSON.stringify({ key, value: newValue }),
          });
        } catch {
          // Revert on failure
          btn.classList.toggle('on', !newValue);
        }
      });
    });
  });
  </script>
</body>
</html>
