<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Sermon Slides - Shabibeh</title>
  <link rel="icon" type="image/png" href="/churchlogo.png">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Sermon Slides</h1>
      <p class="subtitle">View and download sermon slides</p>
    </header>

    <div class="float-label">
      <input
        type="text"
        id="search-input"
        placeholder=" "
      >
      <label for="search-input">Search sermons...</label>
    </div>
    <div class="filter-row">
      <select id="pastor-filter">
        <option value="">All Preachers</option>
      </select>
    </div>

    <div id="loading" class="muted">Loading slides...</div>
    <div id="error-message" class="error hidden"></div>
    <div id="slides-list"></div>
  </div>

  <!-- Fullscreen PDF Viewer -->
  <div id="slide-viewer" class="slide-viewer hidden">
    <div class="viewer-header">
      <span id="viewer-title" class="viewer-title"></span>
      <div class="viewer-actions">
        <button id="viewer-fullscreen" class="viewer-action-btn" title="Fullscreen">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
        </button>
        <button id="viewer-close" class="viewer-close">&times;</button>
      </div>
    </div>
    <iframe id="viewer-frame" class="viewer-frame" allowfullscreen></iframe>
  </div>

  <a href="/" class="home-btn" title="Home">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span>Back to Home</span>
  </a>

  <script src="/js/common.js"></script>
  <script src="/slides/js/app.js"></script>
</body>
</html>
